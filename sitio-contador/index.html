<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Falta poco…</title>
<style>
  :root {
    --gold: #d9a83f;
    --ink: #eae4d6;
    --rose: #c96b74;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    color: var(--ink);
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1b2748 0%, transparent 60%),
      linear-gradient(180deg, #0e1730 0%, #0a1020 100%);
    overflow: hidden;
  }
  /* estrellitas del cielo */
  .cielo { position: fixed; inset: 0; pointer-events: none; }
  .cielo span {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; opacity: .5; animation: titila 3s infinite ease-in-out;
  }
  @keyframes titila { 0%,100% { opacity: .2 } 50% { opacity: .9 } }

  .wrap { position: relative; max-width: 560px; }
  .kicker { text-transform: uppercase; letter-spacing: .45em; font-size: .72rem; color: rgba(234,228,214,.6); }
  .titulo {
    margin-top: 14px; font-size: clamp(2.2rem, 8vw, 3.6rem); color: var(--gold);
    font-family: "Brush Script MT", "Segoe Script", cursive;
    line-height: 1.05;
  }
  .sub { margin-top: 14px; font-size: .98rem; color: rgba(234,228,214,.75); line-height: 1.6; }

  .reloj { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
  .bloque {
    min-width: 74px; padding: 12px 6px; border: 1.5px solid rgba(217,168,63,.4);
    border-radius: 14px; background: rgba(255,255,255,.04); backdrop-filter: blur(4px);
  }
  .num { font-size: 2.1rem; color: var(--gold); font-variant-numeric: tabular-nums; }
  .lab { font-size: .6rem; text-transform: uppercase; letter-spacing: .2em; color: rgba(234,228,214,.55); margin-top: 4px; }

  /* estado del día D */
  .listo { display: none; }
  .btn {
    display: inline-block; margin-top: 26px; padding: 15px 30px; border-radius: 999px;
    background: var(--gold); color: #2a1e08; font-weight: 700; text-decoration: none;
    font-family: ui-sans-serif, system-ui, sans-serif;
    box-shadow: 0 10px 30px -10px rgba(217,168,63,.6);
    transition: transform .2s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .rosa { font-size: 1.6rem; margin-top: 8px; }
  @media (prefers-reduced-motion: reduce) { .cielo span { animation: none; } }
</style>
</head>
<body>
  <div class="cielo" id="cielo" aria-hidden="true"></div>

  <main class="wrap">
    <!-- ANTES del día -->
    <section class="espera" id="espera">
      <p class="kicker">algo se acerca</p>
      <h1 class="titulo">Falta poco…</h1>
      <p class="sub">Guarda este rincón del cielo. Cuando el contador llegue a cero, se abrirá una sorpresa hecha con mucho cariño. 💛</p>
      <div class="reloj" id="reloj" aria-live="polite">
        <div class="bloque"><div class="num" id="d">--</div><div class="lab">días</div></div>
        <div class="bloque"><div class="num" id="h">--</div><div class="lab">horas</div></div>
        <div class="bloque"><div class="num" id="m">--</div><div class="lab">min</div></div>
        <div class="bloque"><div class="num" id="s">--</div><div class="lab">seg</div></div>
      </div>
    </section>

    <!-- EL día D -->
    <section class="listo" id="listo">
      <p class="kicker">al fin es hoy</p>
      <h1 class="titulo">¡Feliz cumpleaños,<br />Isidora!</h1>
      <p class="rosa">🌹</p>
      <p class="sub">Tu sorpresa te está esperando.</p>
      <a class="btn" href="https://ishibonita.vercel.app">Entrar 🎁 →</a>
    </section>
  </main>

  <script>
    // ── Configuración ──────────────────────────────────────────────
    // 00:00:01 hora Santiago (Chile en agosto = UTC−4).
    var OBJETIVO = new Date("2026-08-07T00:00:01-04:00").getTime();
    var DESTINO  = "https://ishibonita.vercel.app";
    // ───────────────────────────────────────────────────────────────

    document.querySelector(".btn").setAttribute("href", DESTINO);

    // Cielo estrellado
    (function () {
      var c = document.getElementById("cielo"), html = "";
      for (var i = 0; i < 60; i++) {
        html += '<span style="left:' + Math.random() * 100 + '%;top:' + Math.random() * 100 +
          '%;animation-delay:' + (Math.random() * 3).toFixed(2) + 's"></span>';
      }
      c.innerHTML = html;
    })();

    var espera = document.getElementById("espera");
    var listo = document.getElementById("listo");
    function n(x) { return String(x).padStart(2, "0"); }

    function tick() {
      var ms = OBJETIVO - Date.now();
      if (ms <= 0) {
        espera.style.display = "none";
        listo.style.display = "block";
        clearInterval(timer);
        return;
      }
      var s = Math.floor(ms / 1000);
      document.getElementById("d").textContent = Math.floor(s / 86400);
      document.getElementById("h").textContent = n(Math.floor((s % 86400) / 3600));
      document.getElementById("m").textContent = n(Math.floor((s % 3600) / 60));
      document.getElementById("s").textContent = n(s % 60);
    }
    tick();
    var timer = setInterval(tick, 1000);
  </script>
</body>
</html>
